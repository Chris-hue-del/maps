/* =========================================================
   RESET
========================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

  height:100%;

/* =========================================================
   ROOT
========================================================= */

  --bg:#edf4ff;

  --shadow:

/* =========================================================
   BODY
========================================================= */

/* =========================================================
   MAP
========================================================= */

}

    radial-gradient(

      rgba(147,197,253,.18),

    ),

      rgba(255,255,255,.04),
      rgba(255,255,255,.24)
    );
}

/* =========================================================
   LEAFLET
========================================================= */

.leaflet-control-zoom{

  box-shadow:var(--shadow)!important;
}

.leaflet-control-zoom a{

}

.leaflet-popup-content{

}

.leaflet-popup-close-button{

}

/* =========================================================
   LOADING
========================================================= */

#loading{

}

@keyframes spin{

.brand-badge{

/* =========================================================

========================================================= */

/* =========================================================

/* =========================================================

========================================================= */

const map = L.map("map",{

/* =========================================================

const markers = {};

let staticLine = null;

/* =========================================================
   WIKI IMAGE
========================================================= */

async function fetchWikiImage(title){

  const url =
    `https://zh.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json&pithumbsize=1200&redirects=1&titles=${encodeURIComponent(title)}&origin=*`;

  try{

    const res = await fetch(url);

    const data = await res.json();

    const pages = data.query.pages;

    const pageId = Object.keys(pages)[0];

    if(
      pageId !== "-1" &&
      pages[pageId].thumbnail
    ){
      return pages[pageId].thumbnail.source;
    }

  }catch(error){

    console.error(error);

  }

  return "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop";

}

/* =========================================================
   HELPERS
========================================================= */

function sleep(ms){
  return new Promise(resolve=>setTimeout(resolve,ms));
}

function cubic(t){

  return t<0.5
    ?4*t*t*t
    :1-Math.pow(-2*t+2,3)/2;
}

function controlPoint(a,b,k=.24){

  const midLat = (a.lat+b.lat)/2;

  const midLng = (a.lng+b.lng)/2;

  const dLat = b.lat-a.lat;

  const dLng = b.lng-a.lng;

  return{
    lat:midLat-dLng*k,
    lng:midLng+dLat*k
  };
}

function bezier(t,p0,p1,p2){

  return(
    (1-t)*(1-t)*p0+
    2*(1-t)*t*p1+
    t*t*p2
  );
}

function createCurve(a,b,steps=100){

  const c = controlPoint(a,b);

  const pts = [];

  for(let i=0;i<=steps;i++){

    const t = i/steps;

    pts.push([

      bezier(
        t,
        a.lat,
        c.lat,
        b.lat
      ),

      bezier(
        t,
        a.lng,
        c.lng,
        b.lng
      )

    ]);

  }

  return pts;
}

function getAngle(p1,p2){

  const dy = p2[0]-p1[0];

  const dx =
    Math.cos(Math.PI/180*p1[0])*
    (p2[1]-p1[1]);

  return(
    -Math.atan2(dy,dx)*180/Math.PI
  )+90;
}

/* =========================================================
   UI
========================================================= */

function activateLocation(id){

  document
    .querySelectorAll(".marker")
    .forEach(el=>el.classList.remove("active"));

  document
    .querySelectorAll(".card")
    .forEach(el=>el.classList.remove("active"));

  const marker =
    document.getElementById(`marker-${id}`);

  if(marker){
    marker.classList.add("active");
  }

  const card =
    document.getElementById(`card-${id}`);

  if(card){

    card.classList.add("active");

    card.scrollIntoView({
      behavior:"smooth",
      block:"nearest"
    });

  }

}

/* =========================================================
   FOCUS
========================================================= */

function focusLocation(id){

  const loc =
    locations.find(x=>x.id===id);

  activateLocation(id);

  map.flyTo(
    [loc.lat,loc.lng],
    8,
    {
      duration:2
    }
  );

  markers[id].openPopup();
}

/* =========================================================
   STATIC ROUTE
========================================================= */

function drawStaticRoute(){

  if(staticLine){
    map.removeLayer(staticLine);
  }

  let pts = [];

  for(let i=0;i<locations.length-1;i++){

    pts = pts.concat(
      createCurve(
        locations[i],
        locations[i+1]
      )
    );
  }

  staticLine = L.polyline(pts,{
    color:"#60a5fa",
    weight:3,
    opacity:.45,
    dashArray:"10 12",
    lineCap:"round"
  }).addTo(map);
}

/* =========================================================
   RESET
========================================================= */

function clearAnimation(){

  if(animatedLine){
    map.removeLayer(animatedLine);
    animatedLine = null;
  }

  if(planeMarker){
    map.removeLayer(planeMarker);
    planeMarker = null;
  }

  if(raf){
    cancelAnimationFrame(raf);
  }

}

/* =========================================================
   AIRPLANE ICON
========================================================= */

const planeHTML = `

<div style="
  width:58px;
  height:58px;

  display:flex;
  align-items:center;
  justify-content:center;
">

<svg
  class="plane-svg"
  width="52"
  height="52"
  viewBox="0 0 24 24"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  style="
    filter:
      drop-shadow(0 10px 18px rgba(96,165,250,.35));
    transition:transform .04s linear;
  "
>

<path
  d="M21 16V14L13 9V3.5A1.5 1.5 0 0011.5 2h-1A1.5 1.5 0 009 3.5V9L1 14V16L9 14L9 19L6.5 20.5V22L11 20.5L15.5 22V20.5L13 19V14L21 16Z"
  fill="url(#g)"
/>

<defs>

<linearGradient
  id="g"
  x1="0"
  y1="0"
  x2="24"
  y2="24"
>

<stop stop-color="#60A5FA"/>
<stop offset="1" stop-color="#7DD3FC"/>

</linearGradient>

</defs>

</svg>

</div>

`;

/* =========================================================
   ANIMATE SEGMENT
========================================================= */

function animateSegment(start,end){

  return new Promise(resolve=>{

    const duration = 2400;

    const points =
      createCurve(start,end,120);

    let startTime = null;

    function frame(timestamp){

      if(!isPlaying){
        resolve();
        return;
      }

      if(!startTime){
        startTime = timestamp;
      }

      const elapsed =
        timestamp-startTime;

      const raw =
        Math.min(elapsed/duration,1);

      const eased =
        cubic(raw);

      const index =
        Math.min(
          Math.floor(
            eased*(points.length-1)
          ),
          points.length-2
        );

      const sub =
        (eased*(points.length-1))%1;

      const lat =
        points[index][0]+
        (points[index+1][0]-points[index][0])*sub;

      const lng =
        points[index][1]+
        (points[index+1][1]-points[index][1])*sub;

      planeMarker.setLatLng([lat,lng]);

      const angle =
        getAngle(
          points[index],
          points[index+1]
        );

      const svg =
        planeMarker
          .getElement()
          ?.querySelector(".plane-svg");

      if(svg){
        svg.style.transform =
          `rotate(${angle}deg)`;
      }

      const existing =
        animatedLine.getLatLngs();

      if(existing.length===0){

        animatedLine.addLatLng([lat,lng]);

      }else{

        existing[existing.length-1] =
          L.latLng(lat,lng);

        animatedLine.setLatLngs(existing);

      }

      map.panTo(
        [lat,lng],
        {
          animate:false
        }
      );

      if(raw<1){

        raf =
          requestAnimationFrame(frame);

      }else{

        animatedLine.addLatLng(
          points[points.length-1]
        );

        resolve();
      }

    }

    raf =
      requestAnimationFrame(frame);

  });

}

/* =========================================================
   START JOURNEY
========================================================= */

async function startJourney(){

  if(isPlaying){
    return;
  }

  isPlaying = true;

  updatePlayButton(true);

  clearAnimation();

  if(staticLine){
    map.removeLayer(staticLine);
  }

  document
    .getElementById("progress-wrap")
    .style.display = "block";

  animatedLine = L.polyline([],{
    color:"#38bdf8",
    weight:5,
    opacity:1,
    lineCap:"round",
    lineJoin:"round"
  }).addTo(map);

  const planeIcon =
    L.divIcon({
      html:planeHTML,
      className:"",
      iconSize:[58,58],
      iconAnchor:[29,29]
    });

  planeMarker =
    L.marker(
      [
        locations[0].lat,
        locations[0].lng
      ],
      {
        icon:planeIcon,
        zIndexOffset:9999
      }
    ).addTo(map);

  for(let i=0;i<locations.length;i++){

    if(!isPlaying){
      break;
    }

    const current =
      locations[i];

    activateLocation(current.id);

    document
      .getElementById("progress")
      .style.width =
        `${(i/(locations.length-1))*100}%`;

    map.flyTo(
      [current.lat,current.lng],
      7,
      {
        duration:1.8
      }
    );

    markers[current.id].openPopup();

    await sleep(1800);

    if(
      i<locations.length-1 &&
      isPlaying
    ){

      map.closePopup();

      await animateSegment(
        current,
        locations[i+1]
      );

    }

  }

  stopJourney();

}

/* =========================================================
   STOP
========================================================= */

function stopJourney(){

  isPlaying = false;

  updatePlayButton(false);

  clearAnimation();

  drawStaticRoute();

}

/* =========================================================
   BUTTON
========================================================= */

function updatePlayButton(playing){

  const btn =
    document.getElementById("playBtn");

  if(playing){

    btn.innerHTML = `

      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 6h4v12H6zm8 0h4v12h-4z"/>
      </svg>

      停止飛行

    `;

  }else{

    btn.innerHTML = `

      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>

      開始飛行

    `;
  }

}

/* =========================================================
   INIT
========================================================= */

async function init(){

  await Promise.all(

    locations.map(async loc=>{

      loc.img =
        await fetchWikiImage(loc.name);

    })

  );

  const list =
    document.getElementById("list");

  for(const loc of locations){

    const icon =
      L.divIcon({

        className:"marker-wrap",

        html:`

          <div
            class="marker"
            id="marker-${loc.id}"
          >
            ${loc.id}
          </div>

        `,

        iconSize:[34,34],
        iconAnchor:[17,17]

      });

    const marker =
      L.marker(
        [loc.lat,loc.lng],
        {icon}
      ).addTo(map);

    markers[loc.id] = marker;

    marker.bindPopup(`

      <div>

        <img
          class="popup-image"
          src="${loc.img}"
          alt="${loc.name}"
        >

        <div class="popup-content">

          <div class="popup-title">
            ${loc.name}
          </div>

          <div class="popup-region">
            ${loc.region}
          </div>

          <div class="popup-desc">
            ${loc.desc}
          </div>

        </div>

      </div>

    `);

    marker.on("click",()=>{
      activateLocation(loc.id);
    });

    const card =
      document.createElement("div");

    card.className = "card";

    card.id = `card-${loc.id}`;

    card.innerHTML = `

      <div class="card-img">

        <img
          src="${loc.img}"
          alt="${loc.name}"
          loading="lazy"
        >

      </div>

      <div class="card-content">

        <div class="card-top">

          <div class="card-index">
            ${loc.id}
          </div>

          <div class="card-name">
            ${loc.name}
          </div>

        </div>

        <div class="card-region">
          ${loc.region}
        </div>

      </div>

    `;

    card.addEventListener(
      "click",
      ()=>{

        if(!isPlaying){
          focusLocation(loc.id);
        }

      }
    );

    list.appendChild(card);

  }

  const group =
    L.featureGroup(
      Object.values(markers)
    );

  map.fitBounds(
    group.getBounds(),
    {
      padding:[80,80]
    }
  );

  drawStaticRoute();

  const loading =
    document.getElementById("loading");

  loading.style.opacity = "0";

  setTimeout(()=>{

    loading.style.display = "none";

  },700);

}

/* =========================================================
   EVENTS
========================================================= */

document
  .getElementById("playBtn")
  .addEventListener("click",()=>{

    if(isPlaying){

      stopJourney();

    }else{

      startJourney();

    }

  });

document
  .getElementById("resetBtn")
  .addEventListener("click",()=>{

    stopJourney();

    document
      .querySelectorAll(".card")
      .forEach(el=>el.classList.remove("active"));

    document
      .querySelectorAll(".marker")
      .forEach(el=>el.classList.remove("active"));

    map.closePopup();

    document
      .getElementById("progress-wrap")
      .style.display = "none";

    document
      .getElementById("progress")
      .style.width = "0%";

    const group =
      L.featureGroup(
        Object.values(markers)
      );

    map.fitBounds(
      group.getBounds(),
      {
        padding:[80,80]
      }
    );

  });

/* =========================================================
   START
========================================================= */

init();

</script>
